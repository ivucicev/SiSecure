# Pulls the prebuilt image published by .github/workflows/docker-publish.yml
# instead of building locally. Usage: docker compose -f docker-compose.ghcr.yml up -d
#
# Note: on first publish, GHCR packages sometimes default to private even on
# a public repo — if the pull is denied, open the package's settings on
# GitHub (Packages tab) and set visibility to public, or `docker login ghcr.io`
# with a token that has read:packages access.
services:
  sisecure:
    image: ghcr.io/ivucicev/sisecure:latest
    container_name: sisecure
    # Always pull before starting, so a plain `docker compose up -d` picks
    # up the newest published image instead of silently reusing whatever
    # was last pulled locally.
    pull_policy: always
    expose:
      - "80"
    restart: unless-stopped
