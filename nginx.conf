server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;
    gzip_min_length 1024;

    # Some base images ship mime.types without a wasm entry — set it
    # explicitly rather than redeclaring the global types map.
    location ~* \.wasm$ {
        add_header Content-Type application/wasm always;
    }

    # Single-page app: let client-side routing (and the #room= hash used by
    # temp rooms, which never even reaches the server) handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
