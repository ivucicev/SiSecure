<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="A pure peer-to-peer messenger with real end-to-end encryption. No server ever sees your messages, contacts, or metadata." />
    <meta name="format-detection" content="telephone=no" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="background-color" content="#0A0A0A" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA install support (no separate Web App Manifest support for
         these until fairly recently, so they're still needed alongside the
         manifest above). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SiSecure" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>SiSecure — Pure P2P Encrypted Messaging</title>

    <!-- Best-effort enhancement on top of body's own height:100dvh (see
         index.css) for the on-screen-keyboard case: window.visualViewport
         tracks the real visible area including keyboard state more
         reliably than the layout viewport on some iOS versions. Guarded
         against h<=0 — visualViewport can report 0 before layout is
         ready, and since CSS's var(--app-height, 100dvh) fallback only
         applies when the property is *unset* (not when it's merely a bad
         value), setting a bogus 0 would permanently break body's height
         until the next real resize event, which may never come. Runs
         inline, before first paint, to avoid a flash of the wrong height. -->
    <script>
      (function () {
        function setAppHeight() {
          var vv = window.visualViewport;
          var h = vv ? vv.height : window.innerHeight;
          if (h > 0) {
            document.documentElement.style.setProperty('--app-height', h + 'px');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
          window.visualViewport.addEventListener('scroll', setAppHeight);
        }

        // body is deliberately NOT position:fixed (see index.css) so the
        // browser's native keyboard-resize reflow can shrink it via
        // --app-height above. The side effect: iOS's own "scroll the page
        // to reveal the focused field" behavior is no longer blocked
        // either, and it fights this app's own fixed-height layout —
        // every screen already positions its composer/input correctly
        // once body's height shrinks, so iOS additionally scrolling body
        // just shoves everything (composer included) off toward the top.
        // Cancel it: iOS performs that scroll asynchronously after focus,
        // so resetting on the same tick is too early — a rAF (and a
        // follow-up on visualViewport's resize/scroll, which fires as the
        // keyboard animates in) catches it after the fact instead.
        function resetScroll() {
          if (window.scrollY !== 0 || window.scrollX !== 0) {
            window.scrollTo(0, 0);
          }
        }
        document.addEventListener('focusin', function (e) {
          var t = e.target;
          if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
            requestAnimationFrame(resetScroll);
            setTimeout(resetScroll, 50);
            setTimeout(resetScroll, 300);
          }
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', resetScroll);
        }

        // visualViewport's resize event reliably fires when the keyboard
        // *opens* (shrinking --app-height correctly) but can be flaky
        // about firing again when it *closes* — leaving --app-height
        // stuck at the smaller, keyboard-open value even after the
        // keyboard is dismissed. That leaves a keyboard-sized dead gap at
        // the bottom of every screen from then on, since body still
        // thinks it's shorter than it actually is. Re-measure explicitly
        // on blur as a backup, with a delay for the keyboard's own close
        // animation to finish first.
        document.addEventListener('focusout', function (e) {
          var t = e.target;
          if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) {
            setTimeout(setAppHeight, 100);
            setTimeout(setAppHeight, 400);
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
