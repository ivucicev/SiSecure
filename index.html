<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="A pure peer-to-peer messenger with real end-to-end encryption. No server ever sees your messages, contacts, or metadata." />
    <meta name="format-detection" content="telephone=no" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="background-color" content="#0A0A0A" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA install support (no separate Web App Manifest support for
         these until fairly recently, so they're still needed alongside the
         manifest above). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SiSecure" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>SiSecure — Pure P2P Encrypted Messaging</title>

    <!-- Best-effort enhancement on top of body's own height:100dvh (see
         index.css) for the on-screen-keyboard case: window.visualViewport
         tracks the real visible area including keyboard state more
         reliably than the layout viewport on some iOS versions. Guarded
         against h<=0 — visualViewport can report 0 before layout is
         ready, and since CSS's var(--app-height, 100dvh) fallback only
         applies when the property is *unset* (not when it's merely a bad
         value), setting a bogus 0 would permanently break body's height
         until the next real resize event, which may never come. Runs
         inline, before first paint, to avoid a flash of the wrong height. -->
    <script>
      (function () {
        function setAppHeight() {
          var vv = window.visualViewport;
          var h = vv ? vv.height : window.innerHeight;
          if (h > 0) {
            document.documentElement.style.setProperty('--app-height', h + 'px');
          }
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
          window.visualViewport.addEventListener('scroll', setAppHeight);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
