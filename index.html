<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="description" content="A pure peer-to-peer messenger with real end-to-end encryption. No server ever sees your messages, contacts, or metadata." />
    <meta name="format-detection" content="telephone=no" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="background-color" content="#0A0A0A" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA install support (no separate Web App Manifest support for
         these until fairly recently, so they're still needed alongside the
         manifest above). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SiSecure" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>SiSecure — Pure P2P Encrypted Messaging</title>

    <!-- iOS doesn't reliably resize position:fixed elements when the
         on-screen keyboard opens — the layout viewport (and CSS units
         derived from it, dvh included) can stay sized to the full screen,
         leaving a gap between fixed-position bottom bars and the actual
         keyboard. window.visualViewport tracks the real visible area
         including keyboard state, so drive the app's height from that
         instead. Runs inline, before first paint, to avoid a flash of the
         wrong height. -->
    <script>
      (function () {
        function setAppHeight() {
          var vv = window.visualViewport;
          var h = vv ? vv.height : window.innerHeight;
          document.documentElement.style.setProperty('--app-height', h + 'px');
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight);
          window.visualViewport.addEventListener('scroll', setAppHeight);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
