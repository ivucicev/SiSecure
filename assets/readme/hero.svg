<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">SiSecure — pure peer-to-peer encrypted messenger</title>
  <desc id="hero-desc">SiSecure connects two devices directly over WebRTC with a Double Ratchet encrypted session; a public signaling broker only helps them find each other and never sees message content.</desc>

  <defs>
    <linearGradient id="linkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="380" rx="28" fill="#0A0A0A"/>
  <rect x="1" y="1" width="1198" height="378" rx="27" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- title block -->
  <g id="title-block" transform="translate(64 0)">
    <g transform="translate(0 66)">
      <rect x="0" y="0" width="330" height="26" rx="13" fill="#3B82F6" fill-opacity="0.12" stroke="#3B82F6" stroke-opacity="0.35"/>
      <text x="16" y="18" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" letter-spacing="1.5" fill="#93C5FD">PEER-TO-PEER &#183; ZERO-KNOWLEDGE</text>
    </g>

    <text x="0" y="176" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="68" font-weight="700" letter-spacing="-1.5" fill="#F4F4F5">SiSecure</text>

    <text x="0" y="224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="400" fill="#A1A1AA">No server ever sees your messages,</text>
    <text x="0" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="19" font-weight="400" fill="#A1A1AA">contacts, or metadata.</text>

    <!-- meta chips -->
    <g transform="translate(0 292)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="600" letter-spacing="1">
      <g>
        <rect x="0" y="0" width="94" height="28" rx="14" fill="#121212" stroke="#FFFFFF" stroke-opacity="0.1"/>
        <text x="47" y="18" text-anchor="middle" fill="#D4D4D8">OLM</text>
      </g>
      <g transform="translate(104 0)">
        <rect x="0" y="0" width="112" height="28" rx="14" fill="#121212" stroke="#FFFFFF" stroke-opacity="0.1"/>
        <text x="56" y="18" text-anchor="middle" fill="#D4D4D8">WEBRTC</text>
      </g>
      <g transform="translate(226 0)">
        <rect x="0" y="0" width="146" height="28" rx="14" fill="#121212" stroke="#FFFFFF" stroke-opacity="0.1"/>
        <text x="73" y="18" text-anchor="middle" fill="#D4D4D8">NO CENTRAL SERVER</text>
      </g>
    </g>
  </g>

  <!-- proof: direct P2P link, no server in the middle -->
  <g id="project-proof" transform="translate(700 0)">
    <text x="230" y="88" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="600" letter-spacing="1.5" fill="#60A5FA">DOUBLE RATCHET SESSION</text>

    <!-- device: you -->
    <rect x="0" y="112" width="150" height="92" rx="16" fill="#121212" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="20" cy="132" r="4" fill="#22C55E"/>
    <text x="32" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="600" letter-spacing="1" fill="#71717A">ONLINE</text>
    <text x="16" y="172" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="600" fill="#F4F4F5">You</text>
    <text x="16" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#71717A">local identity</text>

    <!-- device: contact -->
    <rect x="310" y="112" width="150" height="92" rx="16" fill="#121212" stroke="#FFFFFF" stroke-opacity="0.1"/>
    <circle cx="330" cy="132" r="4" fill="#22C55E"/>
    <text x="342" y="136" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="600" letter-spacing="1" fill="#71717A">ONLINE</text>
    <text x="326" y="172" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="600" fill="#F4F4F5">Contact</text>
    <text x="326" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#71717A">local identity</text>

    <!-- direct encrypted link -->
    <line x1="150" y1="158" x2="310" y2="158" stroke="url(#linkGradient)" stroke-width="3"/>
    <g stroke="#0A0A0A" stroke-width="2">
      <line x1="182" y1="150" x2="182" y2="166"/>
      <line x1="205" y1="150" x2="205" y2="166"/>
      <line x1="228" y1="150" x2="228" y2="166"/>
      <line x1="251" y1="150" x2="251" y2="166"/>
      <line x1="274" y1="150" x2="274" y2="166"/>
    </g>
    <rect x="216" y="145" width="28" height="26" rx="6" fill="#0A0A0A" stroke="#3B82F6"/>
    <path d="M 224 152 v -4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#3B82F6" stroke-width="2"/>
    <rect x="222" y="152" width="16" height="12" rx="2" fill="#3B82F6"/>

    <!-- broker, signaling only, never on the message path -->
    <circle cx="230" cy="270" r="26" fill="#0A0A0A" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="230" y="274" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="600" fill="#71717A">SDP</text>
    <path d="M 60 204 Q 145 240 210 258" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="3 4"/>
    <path d="M 400 204 Q 315 240 250 258" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="3 4"/>
    <text x="230" y="316" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#52525B">signaling broker &#183; never sees content</text>
  </g>
</svg>
